openapi: 3.1.0
info:
  title: Stroman OS API
  version: "1.0.0"
  description: >
    Versioned HTTP delivery layer for Stroman OS MVP workflows. Authentication is
    provided by Supabase Auth (passwordless email OTP) behind a provider-neutral
    boundary: browser clients use a secure HttpOnly session cookie, future mobile/
    API clients use a Supabase bearer access token. Product routes require a
    verified identity; owner identity is derived server-side (never from a request
    body). State-changing cookie requests require a same-origin Origin header
    (CSRF). Mutable resources use ETag / If-Match optimistic concurrency.
servers:
  - url: /
tags:
  - name: Auth
  - name: Projects
  - name: Content
  - name: Rubrics
  - name: Evaluations
  - name: Decisions
  - name: Memory
  - name: Knowledge Acquisition
  - name: Health

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-sos_at
      description: >
        Secure HttpOnly session cookie set by POST /api/auth/verify (the browser
        sends it automatically). Its value is a Supabase access token, verified
        server-side; it is never readable by page JavaScript. State-changing
        requests additionally require a same-origin `Origin` header (CSRF); a
        foreign or absent origin is rejected with 403 REQUEST_ORIGIN_REJECTED. In
        development over http the cookie name is `sos_at` (no `__Host-` prefix).
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Supabase-issued access token for non-browser clients (future mobile/API),
        sent as `Authorization: Bearer <token>`. Because it is not an ambient
        credential, it is exempt from the Origin/CSRF check.
  parameters:
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema: { type: string }
      description: Expected ETag concurrency token, e.g. `"project:3"`.
      example: '"project:3"'
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      schema: { type: string, maxLength: 200 }
  headers:
    ETag:
      description: Opaque, resource-scoped optimistic-concurrency token.
      schema: { type: string }
    XRequestId:
      description: Correlation id echoed on every response.
      schema: { type: string }
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code: { type: string }
            message: { type: string }
            requestId: { type: string }
            fields:
              type: array
              items:
                type: object
                required: [path, code, message]
                properties:
                  path: { type: string }
                  code: { type: string }
                  message: { type: string }
    Project:
      type: object
      required: [id, name, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        status: { type: string, enum: [DRAFT, ACTIVE, COMPLETED, ARCHIVED] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ProjectListItem:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          properties:
            concurrencyToken:
              type: string
              description: Opaque token to copy verbatim into If-Match when mutating this item.
    ProjectList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ProjectListItem" }
    CreateProjectRequest:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
    ContentItem:
      type: object
      required: [id, type, slug, title, status, version, createdAt, updatedAt]
      properties:
        id: { type: string }
        type: { type: string }
        slug: { type: string }
        title: { type: string }
        status: { type: string, enum: [DRAFT, PUBLISHED, ARCHIVED] }
        version: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateContentRequest:
      type: object
      required: [type, slug, title]
      additionalProperties: false
      properties:
        type: { type: string, maxLength: 64 }
        slug: { type: string, maxLength: 120 }
        title: { type: string, maxLength: 200 }
    RubricCriterion:
      type: object
      required: [id, name, weight, anchors]
      properties:
        id: { type: string }
        name: { type: string }
        weight: { type: number }
        anchors:
          type: object
          required: [one, five, ten]
          properties:
            one: { type: string }
            five: { type: string }
            ten: { type: string }
    Rubric:
      type: object
      required: [id, slug, title, criteria]
      properties:
        id: { type: string }
        slug: { type: string }
        title: { type: string }
        criteria:
          type: array
          items: { $ref: "#/components/schemas/RubricCriterion" }
    CreateRubricRequest:
      type: object
      required: [slug, title, criteria]
      additionalProperties: false
      properties:
        slug: { type: string, maxLength: 120 }
        title: { type: string, maxLength: 200 }
        criteria:
          type: array
          minItems: 1
          items:
            type: object
            required: [name, weight, anchors]
            additionalProperties: false
            properties:
              name: { type: string, maxLength: 120 }
              weight: { type: number }
              anchors:
                type: object
                required: [one, five, ten]
                additionalProperties: false
                properties:
                  one: { type: string, maxLength: 500 }
                  five: { type: string, maxLength: 500 }
                  ten: { type: string, maxLength: 500 }
    CriterionScore:
      type: object
      required: [criterionId, score, justification]
      properties:
        criterionId: { type: string }
        score: { type: integer }
        justification: { type: string }
    Evaluation:
      type: object
      required: [id, projectId, rubricId, reviewerType, reviewerId, scores, createdAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        rubricId: { type: string }
        reviewerType: { type: string, enum: [HUMAN, AI] }
        reviewerId: { type: [string, "null"] }
        scores:
          type: array
          items: { $ref: "#/components/schemas/CriterionScore" }
        createdAt: { type: string, format: date-time }
    EvaluationList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Evaluation" }
    RecordEvaluationRequest:
      type: object
      required: [projectId, rubricId, reviewerType, scores]
      additionalProperties: false
      properties:
        projectId: { type: string }
        rubricId: { type: string }
        reviewerType: { type: string, enum: [HUMAN, AI] }
        scores:
          type: array
          minItems: 1
          items:
            type: object
            required: [criterionId, score, justification]
            additionalProperties: false
            properties:
              criterionId: { type: string }
              score: { type: integer }
              justification: { type: string, maxLength: 2000 }
    DecisionOption:
      type: object
      required: [id, label, rationale]
      properties:
        id: { type: string }
        label: { type: string }
        rationale: { type: [string, "null"] }
    AdvisoryEvidence:
      type: object
      required: [sourceLabel, observation, relevance]
      properties:
        sourceLabel: { type: string }
        observation: { type: string }
        relevance: { type: string }
    AdvisoryEvidenceInput:
      type: object
      required: [sourceLabel, observation, relevance]
      additionalProperties: false
      properties:
        sourceLabel: { type: string, maxLength: 200 }
        observation: { type: string, maxLength: 2000 }
        relevance: { type: string, maxLength: 2000 }
    Advisory:
      type: object
      required: [recommendedOptionId, rationale, confidence, evidence]
      properties:
        recommendedOptionId: { type: [string, "null"] }
        rationale: { type: string }
        confidence: { type: number }
        evidence:
          type: array
          items: { $ref: "#/components/schemas/AdvisoryEvidence" }
    Decision:
      type: object
      required:
        [
          id,
          projectId,
          question,
          options,
          advisory,
          status,
          selectedOptionId,
          decidedBy,
          decisionRationale,
          createdAt,
          decidedAt,
        ]
      properties:
        id: { type: string }
        projectId: { type: string }
        question: { type: string }
        options:
          type: array
          items: { $ref: "#/components/schemas/DecisionOption" }
        advisory:
          oneOf:
            - $ref: "#/components/schemas/Advisory"
            - type: "null"
        status: { type: string, enum: [PROPOSED, DECIDED] }
        selectedOptionId: { type: [string, "null"] }
        decidedBy: { type: [string, "null"] }
        decisionRationale: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }
        decidedAt: { type: [string, "null"], format: date-time }
    DecisionListItem:
      allOf:
        - $ref: "#/components/schemas/Decision"
        - type: object
          properties:
            concurrencyToken:
              type: string
              description: Opaque token to copy verbatim into If-Match when mutating this item.
    DecisionList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/DecisionListItem" }
    ProposeDecisionRequest:
      type: object
      required: [projectId, question, options]
      additionalProperties: false
      properties:
        projectId: { type: string }
        question: { type: string, maxLength: 500 }
        options:
          type: array
          minItems: 2
          items:
            type: object
            required: [id, label]
            additionalProperties: false
            properties:
              id: { type: string }
              label: { type: string, maxLength: 200 }
              rationale: { type: [string, "null"], maxLength: 2000 }
        advisory:
          type: object
          required: [rationale, confidence]
          additionalProperties: false
          properties:
            recommendedOptionId: { type: [string, "null"] }
            rationale: { type: string, maxLength: 2000 }
            confidence: { type: number }
            evidence:
              type: array
              maxItems: 20
              items: { $ref: "#/components/schemas/AdvisoryEvidenceInput" }
    AttachAdvisoryRequest:
      type: object
      required: [rationale, confidence]
      additionalProperties: false
      properties:
        recommendedOptionId: { type: [string, "null"] }
        rationale: { type: string, maxLength: 2000 }
        confidence: { type: number }
        evidence:
          type: array
          maxItems: 20
          items: { $ref: "#/components/schemas/AdvisoryEvidenceInput" }
    RecordHumanDecisionRequest:
      type: object
      required: [selectedOptionId, rationale]
      additionalProperties: false
      properties:
        selectedOptionId: { type: string }
        rationale: { type: string, maxLength: 2000 }
    AnalyzeProjectRequest:
      type: object
      required: [title, client, projectType, creativeGoal, targetAudience, desiredEmotion, context]
      additionalProperties: false
      properties:
        title: { type: string, maxLength: 200 }
        client: { type: string, maxLength: 200 }
        projectType: { type: string, maxLength: 120 }
        creativeGoal: { type: string, maxLength: 2000 }
        targetAudience: { type: string, maxLength: 2000 }
        desiredEmotion: { type: string, maxLength: 200 }
        context: { type: string, maxLength: 5000 }
    CreativeBrief:
      type: object
      required:
        [
          id,
          projectId,
          title,
          client,
          projectType,
          creativeGoal,
          targetAudience,
          desiredEmotion,
          context,
          createdAt,
          updatedAt,
        ]
      properties:
        id: { type: string }
        projectId: { type: string }
        title: { type: string }
        client: { type: string }
        projectType: { type: string }
        creativeGoal: { type: string }
        targetAudience: { type: string }
        desiredEmotion: { type: string }
        context: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    HookConcept:
      type: object
      required: [title, description]
      properties:
        title: { type: string }
        description: { type: string }
    Blueprint:
      type: object
      required:
        [
          projectSummary,
          storyObjective,
          audienceAnalysis,
          emotionalArc,
          recommendedStructure,
          hookConcepts,
          editingBlueprint,
          interviewStrategy,
          brollPriorities,
          risks,
          masterPrompt,
        ]
      properties:
        projectSummary: { type: string }
        storyObjective: { type: string }
        audienceAnalysis: { type: string }
        emotionalArc: { type: array, items: { type: string } }
        recommendedStructure: { type: string }
        hookConcepts: { type: array, items: { $ref: "#/components/schemas/HookConcept" } }
        editingBlueprint: { type: array, items: { type: string } }
        interviewStrategy:
          oneOf:
            - type: array
              items: { type: string }
            - type: "null"
        brollPriorities: { type: array, items: { type: string } }
        risks: { type: array, items: { type: string } }
        masterPrompt: { type: string }
    Analysis:
      type: object
      required: [brief, blueprint]
      properties:
        brief: { $ref: "#/components/schemas/CreativeBrief" }
        blueprint: { $ref: "#/components/schemas/Blueprint" }
    Ok:
      type: object
      properties: { ok: { type: boolean } }
    MemoryEntity:
      type: object
      required: [id, name, kind, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        kind: { type: string }
        createdAt: { type: string, format: date-time }
    MemoryEntityList:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/MemoryEntity" } }
    MemorySource:
      type: object
      required: [id, label, sourceType, url, detail, createdAt]
      properties:
        id: { type: string }
        label: { type: string }
        sourceType: { type: string }
        url: { type: [string, "null"] }
        detail: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }
    MemorySourceList:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/MemorySource" } }
    MemoryRecord:
      type: object
      required: [id, entityId, sourceId, content, createdAt]
      properties:
        id: { type: string }
        entityId: { type: string }
        sourceId: { type: [string, "null"] }
        content: { type: string }
        createdAt: { type: string, format: date-time }
    MemoryRecordList:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/MemoryRecord" } }
    MemoryRelationship:
      type: object
      required: [id, fromEntityId, toEntityId, relationType, createdAt]
      properties:
        id: { type: string }
        fromEntityId: { type: string }
        toEntityId: { type: string }
        relationType: { type: string }
        createdAt: { type: string, format: date-time }
    MemoryRelationshipList:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/MemoryRelationship" } }
    MemoryInsight:
      type: object
      required: [id, statement, confidence, evidence, memoryIds, createdAt]
      properties:
        id: { type: string }
        statement: { type: string }
        confidence: { type: number }
        evidence: { type: [string, "null"] }
        memoryIds: { type: array, items: { type: string } }
        createdAt: { type: string, format: date-time }
    MemoryInsightList:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/MemoryInsight" } }
    EntityKnowledge:
      type: object
      required: [entity, memories, relationships, insights]
      properties:
        entity: { $ref: "#/components/schemas/MemoryEntity" }
        memories:
          type: array
          items:
            type: object
            required: [memory, source]
            properties:
              memory: { $ref: "#/components/schemas/MemoryRecord" }
              source:
                oneOf:
                  - $ref: "#/components/schemas/MemorySource"
                  - type: "null"
        relationships:
          type: array
          items:
            type: object
            required: [relationship, direction, otherEntity]
            properties:
              relationship: { $ref: "#/components/schemas/MemoryRelationship" }
              direction: { type: string, enum: [outgoing, incoming] }
              otherEntity:
                oneOf:
                  - $ref: "#/components/schemas/MemoryEntity"
                  - type: "null"
        insights:
          type: array
          items:
            type: object
            required: [insight, citedMemories]
            properties:
              insight: { $ref: "#/components/schemas/MemoryInsight" }
              citedMemories: { type: array, items: { $ref: "#/components/schemas/MemoryRecord" } }
    CreateEntityRequest:
      type: object
      required: [name, kind]
      additionalProperties: false
      properties:
        name: { type: string, maxLength: 200 }
        kind: { type: string, maxLength: 60 }
    CreateSourceRequest:
      type: object
      required: [label, sourceType]
      additionalProperties: false
      properties:
        label: { type: string, maxLength: 200 }
        sourceType: { type: string, maxLength: 60 }
        url: { type: [string, "null"], maxLength: 2000 }
        detail: { type: [string, "null"], maxLength: 5000 }
    CreateMemoryRequest:
      type: object
      required: [entityId, content]
      additionalProperties: false
      properties:
        entityId: { type: string }
        sourceId: { type: [string, "null"] }
        content: { type: string, maxLength: 5000 }
    CreateRelationshipRequest:
      type: object
      required: [fromEntityId, toEntityId, relationType]
      additionalProperties: false
      properties:
        fromEntityId: { type: string }
        toEntityId: { type: string }
        relationType: { type: string, maxLength: 60 }
    CreateInsightRequest:
      type: object
      required: [statement, confidence, memoryIds]
      additionalProperties: false
      properties:
        statement: { type: string, maxLength: 2000 }
        confidence: { type: number }
        evidence: { type: [string, "null"], maxLength: 5000 }
        memoryIds: { type: array, minItems: 1, items: { type: string } }
    ObservationPayload:
      oneOf:
        - type: object
          additionalProperties: false
          required: [kind, name, entityKind]
          properties:
            kind: { const: ENTITY }
            name: { type: string, minLength: 1, maxLength: 200 }
            entityKind: { type: string, minLength: 1, maxLength: 60 }
        - type: object
          additionalProperties: false
          required: [kind, content]
          properties:
            kind: { const: MEMORY }
            content: { type: string, minLength: 1, maxLength: 5000 }
        - type: object
          additionalProperties: false
          required: [kind, statement]
          properties:
            kind: { const: INSIGHT }
            statement: { type: string, minLength: 1, maxLength: 2000 }
        - type: object
          additionalProperties: false
          required: [kind, relationType, fromLabel, toLabel]
          properties:
            kind: { const: RELATIONSHIP }
            relationType: { type: string, minLength: 1, maxLength: 60 }
            fromLabel: { type: string, minLength: 1, maxLength: 200 }
            toLabel: { type: string, minLength: 1, maxLength: 200 }
      discriminator: { propertyName: kind }
    ExtractionLocation:
      type: [object, "null"]
      additionalProperties: false
      properties:
        textSpan: { type: [string, "null"], maxLength: 5000 }
        charStart: { type: [integer, "null"], minimum: 0 }
        charEnd: { type: [integer, "null"], minimum: 0 }
        timeStartMs: { type: [integer, "null"], minimum: 0 }
        timeEndMs: { type: [integer, "null"], minimum: 0 }
        pageNumber: { type: [integer, "null"], minimum: 1 }
    ObservationEvidence:
      type: object
      required: [sourceDocumentId, knowledgeSourceId, acquisitionRunId, location]
      properties:
        sourceDocumentId: { type: string }
        knowledgeSourceId: { type: string }
        acquisitionRunId: { type: [string, "null"] }
        location: { $ref: "#/components/schemas/ExtractionLocation" }
    KnowledgeSource:
      type: object
      required: [id, name, sourceType, origin, sourceReliability, status, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        sourceType: { type: string, enum: [UPLOAD, WEB_PAGE, MANUAL] }
        origin: { type: [string, "null"] }
        sourceReliability: { type: string, enum: [VERIFIED, HIGH, MEDIUM, LOW, UNKNOWN] }
        status: { type: string, enum: [ACTIVE, PAUSED, ARCHIVED] }
        createdAt: { type: string, format: date-time }
    SourceDocument:
      type: object
      required:
        [id, knowledgeSourceId, documentType, contentHash, title, mediaType, byteSize, createdAt]
      properties:
        id: { type: string }
        knowledgeSourceId: { type: string }
        documentType:
          { type: string, enum: [TRANSCRIPT, ARTICLE, WEB_PAGE, SOCIAL_POST, PDF, VIDEO, NOTE] }
        contentHash: { type: string }
        title: { type: string }
        mediaType: { type: [string, "null"] }
        byteSize: { type: [integer, "null"] }
        createdAt: { type: string, format: date-time }
    RunSummary:
      type: object
      required: [documentsProcessed, observationsCreated, failureCount]
      properties:
        documentsProcessed: { type: integer, minimum: 0 }
        observationsCreated: { type: integer, minimum: 0 }
        failureCount: { type: integer, minimum: 0 }
    AcquisitionRun:
      type: object
      required:
        [
          id,
          knowledgeSourceId,
          extractor,
          extractorVersion,
          status,
          startedAt,
          finishedAt,
          summary,
          createdAt,
        ]
      properties:
        id: { type: string }
        knowledgeSourceId: { type: string }
        extractor: { type: string }
        extractorVersion: { type: string }
        status: { type: string, enum: [PENDING, RUNNING, SUCCEEDED, PARTIALLY_SUCCEEDED, FAILED] }
        startedAt: { type: [string, "null"], format: date-time }
        finishedAt: { type: [string, "null"], format: date-time }
        summary:
          oneOf:
            - $ref: "#/components/schemas/RunSummary"
            - type: "null"
        createdAt: { type: string, format: date-time }
    KnowledgeObservation:
      type: object
      required: [id, observationType, payload, evidence, confidence, createdBy, status, createdAt]
      properties:
        id: { type: string }
        observationType: { type: string, enum: [ENTITY, MEMORY, INSIGHT, RELATIONSHIP] }
        payload: { $ref: "#/components/schemas/ObservationPayload" }
        evidence: { $ref: "#/components/schemas/ObservationEvidence" }
        confidence: { type: [number, "null"], minimum: 0, maximum: 1 }
        createdBy: { type: string, enum: [AI, HUMAN, IMPORT] }
        status: { type: string, enum: [PENDING_REVIEW, ACCEPTED, REJECTED] }
        createdAt: { type: string, format: date-time }
    KnowledgeReview:
      type: object
      required:
        [
          id,
          knowledgeObservationId,
          outcome,
          reviewerId,
          note,
          editedPayload,
          reviewedAt,
          createdAt,
        ]
      properties:
        id: { type: string }
        knowledgeObservationId: { type: string }
        outcome: { type: string, enum: [ACCEPT, EDIT_AND_ACCEPT, REJECT] }
        reviewerId: { type: string }
        note: { type: [string, "null"] }
        editedPayload:
          oneOf:
            - $ref: "#/components/schemas/ObservationPayload"
            - type: "null"
        reviewedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
    ObservationWithReview:
      type: object
      required: [observation, review]
      properties:
        observation: { $ref: "#/components/schemas/KnowledgeObservation" }
        review:
          oneOf:
            - $ref: "#/components/schemas/KnowledgeReview"
            - type: "null"
    KnowledgeEngineRef:
      type: object
      required: [recordType, recordId]
      properties:
        recordType: { type: string, enum: [ENTITY, MEMORY, INSIGHT, RELATIONSHIP] }
        recordId: { type: string }
    Materialization:
      type: object
      required: [knowledgeObservationId, knowledgeReviewId, record, createdAt]
      properties:
        knowledgeObservationId: { type: string }
        knowledgeReviewId: { type: string }
        record: { $ref: "#/components/schemas/KnowledgeEngineRef" }
        createdAt: { type: string, format: date-time }
    CreateKnowledgeSourceRequest:
      type: object
      additionalProperties: false
      required: [name, sourceType, sourceReliability]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        sourceType: { type: string, enum: [UPLOAD, WEB_PAGE, MANUAL] }
        origin: { type: [string, "null"], maxLength: 2000 }
        sourceReliability: { type: string, enum: [VERIFIED, HIGH, MEDIUM, LOW, UNKNOWN] }
    AddSourceDocumentRequest:
      type: object
      additionalProperties: false
      required: [documentType, contentHash, title]
      properties:
        documentType:
          { type: string, enum: [TRANSCRIPT, ARTICLE, WEB_PAGE, SOCIAL_POST, PDF, VIDEO, NOTE] }
        contentHash: { type: string, minLength: 1, maxLength: 512 }
        title: { type: string, minLength: 1, maxLength: 300 }
        mediaType: { type: [string, "null"], maxLength: 255 }
        byteSize: { type: [integer, "null"], minimum: 0 }
    CreateAcquisitionRunRequest:
      type: object
      additionalProperties: false
      required: [extractor, extractorVersion]
      properties:
        extractor: { type: string, minLength: 1, maxLength: 120 }
        extractorVersion: { type: string, minLength: 1, maxLength: 60 }
    CompleteAcquisitionRunRequest:
      type: object
      additionalProperties: false
      required: [status, summary]
      properties:
        status: { type: string, enum: [SUCCEEDED, PARTIALLY_SUCCEEDED, FAILED] }
        summary: { $ref: "#/components/schemas/RunSummary" }
    CreateKnowledgeObservationRequest:
      type: object
      additionalProperties: false
      required: [knowledgeSourceId, sourceDocumentId, payload, createdBy]
      properties:
        knowledgeSourceId: { type: string }
        sourceDocumentId: { type: string }
        acquisitionRunId: { type: [string, "null"] }
        location: { $ref: "#/components/schemas/ExtractionLocation" }
        payload: { $ref: "#/components/schemas/ObservationPayload" }
        createdBy: { type: string, enum: [AI, HUMAN, IMPORT] }
        confidence: { type: [number, "null"], minimum: 0, maximum: 1 }
    ReviewObservationRequest:
      type: object
      additionalProperties: false
      required: [outcome]
      properties:
        outcome: { type: string, enum: [ACCEPT, EDIT_AND_ACCEPT, REJECT] }
        note: { type: [string, "null"], maxLength: 2000 }
        editedPayload:
          oneOf:
            - $ref: "#/components/schemas/ObservationPayload"
            - type: "null"
    MaterializeObservationRequest:
      type: object
      additionalProperties: false
      required: [resolution]
      properties:
        resolution:
          oneOf:
            - type: object
              additionalProperties: false
              required: [kind]
              properties: { kind: { const: ENTITY } }
            - type: object
              additionalProperties: false
              required: [kind, entityId]
              properties:
                kind: { const: MEMORY }
                entityId: { type: string }
                sourceId: { type: [string, "null"] }
            - type: object
              additionalProperties: false
              required: [kind, memoryIds]
              properties:
                kind: { const: INSIGHT }
                memoryIds: { type: array, minItems: 1, maxItems: 100, items: { type: string } }
                confidence: { type: [number, "null"], minimum: 0, maximum: 1 }
                evidence: { type: [string, "null"], maxLength: 5000 }
            - type: object
              additionalProperties: false
              required: [kind, fromEntityId, toEntityId]
              properties:
                kind: { const: RELATIONSHIP }
                fromEntityId: { type: string }
                toEntityId: { type: string }
          discriminator: { propertyName: kind }
  responses:
    BadRequest:
      description: Malformed request or precondition.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: >
        Authentication is required or the session is invalid/expired
        (AUTHENTICATION_REQUIRED or INVALID_SESSION). A `WWW-Authenticate: Bearer`
        header is returned.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: >
        The authenticated caller is not permitted (FORBIDDEN cross-owner access,
        ACCOUNT_DISABLED, or REQUEST_ORIGIN_REJECTED for a failed CSRF check).
        Private resources owned by another user return 403 (existence is not
        otherwise concealed at this stage — see docs/AUTHENTICATION_ARCHITECTURE.md).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ServiceUnavailable:
      description: >
        Authentication is temporarily unavailable (AUTHENTICATION_UNAVAILABLE) —
        e.g. the provider or identity store could not be reached. Fail-closed.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: Duplicate, invalid transition, or stale-write conflict.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unprocessable:
      description: Structurally valid but semantically rejected.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    PreconditionRequired:
      description: An If-Match precondition is required.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

# Product routes require a verified identity via EITHER a session cookie OR a
# bearer token. Public routes (health, auth initiation) override with `security: []`.
security:
  - cookieAuth: []
  - bearerAuth: []

paths:
  /api/auth/start:
    post:
      tags: [Auth]
      operationId: startEmailOtp
      security: []
      summary: Begin passwordless email-OTP sign-in (sends a code).
      description: >
        Neutral by design — the response never reveals whether an account exists.
        Abuse is bounded by the provider's native rate limits.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              additionalProperties: false
              properties:
                email: { type: string, format: email, maxLength: 320 }
            example: { email: "chef@example.com" }
      responses:
        "200":
          description: A code has been sent if the address can receive one.
          content:
            application/json:
              schema:
                type: object
                properties: { message: { type: string } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429":
          description: Too many requests (provider rate limit).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/auth/verify:
    post:
      tags: [Auth]
      operationId: verifyEmailOtp
      security: []
      summary: Verify an email OTP and establish a session.
      description: >
        On success, sets secure HttpOnly session cookies (access + refresh). Tokens
        are never returned in the body. Internal identity is provisioned lazily on
        the first protected request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, token]
              additionalProperties: false
              properties:
                email: { type: string, format: email, maxLength: 320 }
                token: { type: string, minLength: 4, maxLength: 12 }
      responses:
        "200":
          description: Session established; session cookies set.
          headers:
            Set-Cookie:
              description: Secure HttpOnly access and refresh session cookies.
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                properties: { authenticated: { type: boolean } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: The verification code is invalid (INVALID_OTP).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429":
          description: Too many requests (provider rate limit).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/auth/callback:
    post:
      tags: [Auth]
      operationId: completeAuthCallback
      security: []
      summary: Complete a magic-link sign-in and establish the session.
      description: >
        Called by the /auth/callback page with the provider session it read from the
        redirect fragment. CSRF-protected (same-origin Origin required). The access
        token is re-verified server-side before any cookie is set; tokens are never
        returned in the body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accessToken, refreshToken]
              additionalProperties: false
              properties:
                accessToken: { type: string }
                refreshToken: { type: string }
                expiresInSeconds: { type: integer }
      responses:
        "200":
          description: Session established; session cookies set.
          headers:
            Set-Cookie:
              description: Secure HttpOnly access and refresh session cookies.
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                properties: { authenticated: { type: boolean } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/auth/session:
    get:
      tags: [Auth]
      operationId: getSession
      security: []
      summary: Report whether the caller has a valid session.
      description: Returns only a boolean; never the user id, email, tokens, or claims.
      responses:
        "200":
          description: Session state.
          content:
            application/json:
              schema:
                type: object
                required: [authenticated]
                properties: { authenticated: { type: boolean } }
  /api/auth/sign-out:
    post:
      tags: [Auth]
      operationId: signOut
      security: []
      summary: Sign out (clears session cookies).
      description: >
        Idempotent. CSRF-protected: a cookie-bearing sign-out must come from an
        allowed origin, else 403 REQUEST_ORIGIN_REJECTED.
      responses:
        "200":
          description: Signed out; session cookies cleared.
          headers:
            Set-Cookie:
              description: Cleared session cookies (Max-Age=0).
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                properties: { ok: { type: boolean } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/health/live:
    get:
      tags: [Health]
      operationId: healthLive
      security: []
      summary: Liveness probe (no database dependency).
      responses:
        "200":
          description: Alive.
