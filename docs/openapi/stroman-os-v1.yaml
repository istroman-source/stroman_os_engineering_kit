openapi: 3.1.0
info:
  title: Stroman OS API
  version: "1.0.0"
  description: >
    Versioned HTTP delivery layer for Stroman OS MVP workflows. Authentication is
    provided by Supabase Auth (passwordless email OTP) behind a provider-neutral
    boundary: browser clients use a secure HttpOnly session cookie, future mobile/
    API clients use a Supabase bearer access token. Product routes require a
    verified identity; owner identity is derived server-side (never from a request
    body). State-changing cookie requests require a same-origin Origin header
    (CSRF). Mutable resources use ETag / If-Match optimistic concurrency.
servers:
  - url: /
tags:
  - name: Auth
  - name: Projects
  - name: Content
  - name: Rubrics
  - name: Evaluations
  - name: Decisions
  - name: Health

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-sos_at
      description: >
        Secure HttpOnly session cookie set by POST /api/auth/verify (the browser
        sends it automatically). Its value is a Supabase access token, verified
        server-side; it is never readable by page JavaScript. State-changing
        requests additionally require a same-origin `Origin` header (CSRF); a
        foreign or absent origin is rejected with 403 REQUEST_ORIGIN_REJECTED. In
        development over http the cookie name is `sos_at` (no `__Host-` prefix).
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Supabase-issued access token for non-browser clients (future mobile/API),
        sent as `Authorization: Bearer <token>`. Because it is not an ambient
        credential, it is exempt from the Origin/CSRF check.
  parameters:
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema: { type: string }
      description: Expected ETag concurrency token, e.g. `"project:3"`.
      example: '"project:3"'
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      schema: { type: string, maxLength: 200 }
  headers:
    ETag:
      description: Opaque, resource-scoped optimistic-concurrency token.
      schema: { type: string }
    XRequestId:
      description: Correlation id echoed on every response.
      schema: { type: string }
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code: { type: string }
            message: { type: string }
            requestId: { type: string }
            fields:
              type: array
              items:
                type: object
                required: [path, code, message]
                properties:
                  path: { type: string }
                  code: { type: string }
                  message: { type: string }
    Project:
      type: object
      required: [id, name, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        status: { type: string, enum: [DRAFT, ACTIVE, COMPLETED, ARCHIVED] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ProjectListItem:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          properties:
            concurrencyToken:
              type: string
              description: Opaque token to copy verbatim into If-Match when mutating this item.
    ProjectList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ProjectListItem" }
    CreateProjectRequest:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
    ContentItem:
      type: object
      required: [id, type, slug, title, status, version, createdAt, updatedAt]
      properties:
        id: { type: string }
        type: { type: string }
        slug: { type: string }
        title: { type: string }
        status: { type: string, enum: [DRAFT, PUBLISHED, ARCHIVED] }
        version: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateContentRequest:
      type: object
      required: [type, slug, title]
      additionalProperties: false
      properties:
        type: { type: string, maxLength: 64 }
        slug: { type: string, maxLength: 120 }
        title: { type: string, maxLength: 200 }
    RubricCriterion:
      type: object
      required: [id, name, weight, anchors]
      properties:
        id: { type: string }
        name: { type: string }
        weight: { type: number }
        anchors:
          type: object
          required: [one, five, ten]
          properties:
            one: { type: string }
            five: { type: string }
            ten: { type: string }
    Rubric:
      type: object
      required: [id, slug, title, criteria]
      properties:
        id: { type: string }
        slug: { type: string }
        title: { type: string }
        criteria:
          type: array
          items: { $ref: "#/components/schemas/RubricCriterion" }
    CreateRubricRequest:
      type: object
      required: [slug, title, criteria]
      additionalProperties: false
      properties:
        slug: { type: string, maxLength: 120 }
        title: { type: string, maxLength: 200 }
        criteria:
          type: array
          minItems: 1
          items:
            type: object
            required: [name, weight, anchors]
            additionalProperties: false
            properties:
              name: { type: string, maxLength: 120 }
              weight: { type: number }
              anchors:
                type: object
                required: [one, five, ten]
                additionalProperties: false
                properties:
                  one: { type: string, maxLength: 500 }
                  five: { type: string, maxLength: 500 }
                  ten: { type: string, maxLength: 500 }
    CriterionScore:
      type: object
      required: [criterionId, score, justification]
      properties:
        criterionId: { type: string }
        score: { type: integer }
        justification: { type: string }
    Evaluation:
      type: object
      required: [id, projectId, rubricId, reviewerType, reviewerId, scores, createdAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        rubricId: { type: string }
        reviewerType: { type: string, enum: [HUMAN, AI] }
        reviewerId: { type: [string, "null"] }
        scores:
          type: array
          items: { $ref: "#/components/schemas/CriterionScore" }
        createdAt: { type: string, format: date-time }
    EvaluationList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Evaluation" }
    RecordEvaluationRequest:
      type: object
      required: [projectId, rubricId, reviewerType, scores]
      additionalProperties: false
      properties:
        projectId: { type: string }
        rubricId: { type: string }
        reviewerType: { type: string, enum: [HUMAN, AI] }
        scores:
          type: array
          minItems: 1
          items:
            type: object
            required: [criterionId, score, justification]
            additionalProperties: false
            properties:
              criterionId: { type: string }
              score: { type: integer }
              justification: { type: string, maxLength: 2000 }
    DecisionOption:
      type: object
      required: [id, label, rationale]
      properties:
        id: { type: string }
        label: { type: string }
        rationale: { type: [string, "null"] }
    AdvisoryEvidence:
      type: object
      required: [sourceLabel, observation, relevance]
      properties:
        sourceLabel: { type: string }
        observation: { type: string }
        relevance: { type: string }
    AdvisoryEvidenceInput:
      type: object
      required: [sourceLabel, observation, relevance]
      additionalProperties: false
      properties:
        sourceLabel: { type: string, maxLength: 200 }
        observation: { type: string, maxLength: 2000 }
        relevance: { type: string, maxLength: 2000 }
    Advisory:
      type: object
      required: [recommendedOptionId, rationale, confidence, evidence]
      properties:
        recommendedOptionId: { type: [string, "null"] }
        rationale: { type: string }
        confidence: { type: number }
        evidence:
          type: array
          items: { $ref: "#/components/schemas/AdvisoryEvidence" }
    Decision:
      type: object
      required:
        [
          id,
          projectId,
          question,
          options,
          advisory,
          status,
          selectedOptionId,
          decidedBy,
          decisionRationale,
          createdAt,
          decidedAt,
        ]
      properties:
        id: { type: string }
        projectId: { type: string }
        question: { type: string }
        options:
          type: array
          items: { $ref: "#/components/schemas/DecisionOption" }
        advisory:
          oneOf:
            - $ref: "#/components/schemas/Advisory"
            - type: "null"
        status: { type: string, enum: [PROPOSED, DECIDED] }
        selectedOptionId: { type: [string, "null"] }
        decidedBy: { type: [string, "null"] }
        decisionRationale: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }
        decidedAt: { type: [string, "null"], format: date-time }
    DecisionListItem:
      allOf:
        - $ref: "#/components/schemas/Decision"
        - type: object
          properties:
            concurrencyToken:
              type: string
              description: Opaque token to copy verbatim into If-Match when mutating this item.
    DecisionList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/DecisionListItem" }
    ProposeDecisionRequest:
      type: object
      required: [projectId, question, options]
      additionalProperties: false
      properties:
        projectId: { type: string }
        question: { type: string, maxLength: 500 }
        options:
          type: array
          minItems: 2
          items:
            type: object
            required: [id, label]
            additionalProperties: false
            properties:
              id: { type: string }
              label: { type: string, maxLength: 200 }
              rationale: { type: [string, "null"], maxLength: 2000 }
        advisory:
          type: object
          required: [rationale, confidence]
          additionalProperties: false
          properties:
            recommendedOptionId: { type: [string, "null"] }
            rationale: { type: string, maxLength: 2000 }
            confidence: { type: number }
            evidence:
              type: array
              maxItems: 20
              items: { $ref: "#/components/schemas/AdvisoryEvidenceInput" }
    AttachAdvisoryRequest:
      type: object
      required: [rationale, confidence]
      additionalProperties: false
      properties:
        recommendedOptionId: { type: [string, "null"] }
        rationale: { type: string, maxLength: 2000 }
        confidence: { type: number }
        evidence:
          type: array
          maxItems: 20
          items: { $ref: "#/components/schemas/AdvisoryEvidenceInput" }
    RecordHumanDecisionRequest:
      type: object
      required: [selectedOptionId, rationale]
      additionalProperties: false
      properties:
        selectedOptionId: { type: string }
        rationale: { type: string, maxLength: 2000 }
    AnalyzeProjectRequest:
      type: object
      required: [title, client, projectType, creativeGoal, targetAudience, desiredEmotion, context]
      additionalProperties: false
      properties:
        title: { type: string, maxLength: 200 }
        client: { type: string, maxLength: 200 }
        projectType: { type: string, maxLength: 120 }
        creativeGoal: { type: string, maxLength: 2000 }
        targetAudience: { type: string, maxLength: 2000 }
        desiredEmotion: { type: string, maxLength: 200 }
        context: { type: string, maxLength: 5000 }
    CreativeBrief:
      type: object
      required:
        [
          id,
          projectId,
          title,
          client,
          projectType,
          creativeGoal,
          targetAudience,
          desiredEmotion,
          context,
          createdAt,
          updatedAt,
        ]
      properties:
        id: { type: string }
        projectId: { type: string }
        title: { type: string }
        client: { type: string }
        projectType: { type: string }
        creativeGoal: { type: string }
        targetAudience: { type: string }
        desiredEmotion: { type: string }
        context: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    HookConcept:
      type: object
      required: [title, description]
      properties:
        title: { type: string }
        description: { type: string }
    Blueprint:
      type: object
      required:
        [
          projectSummary,
          storyObjective,
          audienceAnalysis,
          emotionalArc,
          recommendedStructure,
          hookConcepts,
          editingBlueprint,
          interviewStrategy,
          brollPriorities,
          risks,
          masterPrompt,
        ]
      properties:
        projectSummary: { type: string }
        storyObjective: { type: string }
        audienceAnalysis: { type: string }
        emotionalArc: { type: array, items: { type: string } }
        recommendedStructure: { type: string }
        hookConcepts: { type: array, items: { $ref: "#/components/schemas/HookConcept" } }
        editingBlueprint: { type: array, items: { type: string } }
        interviewStrategy:
          oneOf:
            - type: array
              items: { type: string }
            - type: "null"
        brollPriorities: { type: array, items: { type: string } }
        risks: { type: array, items: { type: string } }
        masterPrompt: { type: string }
    Analysis:
      type: object
      required: [brief, blueprint]
      properties:
        brief: { $ref: "#/components/schemas/CreativeBrief" }
        blueprint: { $ref: "#/components/schemas/Blueprint" }
  responses:
    BadRequest:
      description: Malformed request or precondition.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: >
        Authentication is required or the session is invalid/expired
        (AUTHENTICATION_REQUIRED or INVALID_SESSION). A `WWW-Authenticate: Bearer`
        header is returned.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: >
        The authenticated caller is not permitted (FORBIDDEN cross-owner access,
        ACCOUNT_DISABLED, or REQUEST_ORIGIN_REJECTED for a failed CSRF check).
        Private resources owned by another user return 403 (existence is not
        otherwise concealed at this stage — see docs/AUTHENTICATION_ARCHITECTURE.md).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ServiceUnavailable:
      description: >
        Authentication is temporarily unavailable (AUTHENTICATION_UNAVAILABLE) —
        e.g. the provider or identity store could not be reached. Fail-closed.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: Duplicate, invalid transition, or stale-write conflict.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unprocessable:
      description: Structurally valid but semantically rejected.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    PreconditionRequired:
      description: An If-Match precondition is required.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

# Product routes require a verified identity via EITHER a session cookie OR a
# bearer token. Public routes (health, auth initiation) override with `security: []`.
security:
  - cookieAuth: []
  - bearerAuth: []

paths:
  /api/auth/start:
    post:
      tags: [Auth]
      operationId: startEmailOtp
      security: []
      summary: Begin passwordless email-OTP sign-in (sends a code).
      description: >
        Neutral by design — the response never reveals whether an account exists.
        Abuse is bounded by the provider's native rate limits.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              additionalProperties: false
              properties:
                email: { type: string, format: email, maxLength: 320 }
            example: { email: "chef@example.com" }
      responses:
        "200":
          description: A code has been sent if the address can receive one.
          content:
            application/json:
              schema:
                type: object
                properties: { message: { type: string } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429":
          description: Too many requests (provider rate limit).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/auth/verify:
    post:
      tags: [Auth]
      operationId: verifyEmailOtp
      security: []
      summary: Verify an email OTP and establish a session.
      description: >
        On success, sets secure HttpOnly session cookies (access + refresh). Tokens
        are never returned in the body. Internal identity is provisioned lazily on
        the first protected request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, token]
              additionalProperties: false
              properties:
                email: { type: string, format: email, maxLength: 320 }
                token: { type: string, minLength: 4, maxLength: 12 }
      responses:
        "200":
          description: Session established; session cookies set.
          headers:
            Set-Cookie:
              description: Secure HttpOnly access and refresh session cookies.
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                properties: { authenticated: { type: boolean } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: The verification code is invalid (INVALID_OTP).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429":
          description: Too many requests (provider rate limit).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/auth/callback:
    post:
      tags: [Auth]
      operationId: completeAuthCallback
      security: []
      summary: Complete a magic-link sign-in and establish the session.
      description: >
        Called by the /auth/callback page with the provider session it read from the
        redirect fragment. CSRF-protected (same-origin Origin required). The access
        token is re-verified server-side before any cookie is set; tokens are never
        returned in the body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accessToken, refreshToken]
              additionalProperties: false
              properties:
                accessToken: { type: string }
                refreshToken: { type: string }
                expiresInSeconds: { type: integer }
      responses:
        "200":
          description: Session established; session cookies set.
          headers:
            Set-Cookie:
              description: Secure HttpOnly access and refresh session cookies.
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                properties: { authenticated: { type: boolean } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/auth/session:
    get:
      tags: [Auth]
      operationId: getSession
      security: []
      summary: Report whether the caller has a valid session.
      description: Returns only a boolean; never the user id, email, tokens, or claims.
      responses:
        "200":
          description: Session state.
          content:
            application/json:
              schema:
                type: object
                required: [authenticated]
                properties: { authenticated: { type: boolean } }
  /api/auth/sign-out:
    post:
      tags: [Auth]
      operationId: signOut
      security: []
      summary: Sign out (clears session cookies).
      description: >
        Idempotent. CSRF-protected: a cookie-bearing sign-out must come from an
        allowed origin, else 403 REQUEST_ORIGIN_REJECTED.
      responses:
        "200":
          description: Signed out; session cookies cleared.
          headers:
            Set-Cookie:
              description: Cleared session cookies (Max-Age=0).
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                properties: { ok: { type: boolean } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/health/live:
    get:
      tags: [Health]
      operationId: healthLive
      security: []
      summary: Liveness probe (no database dependency).
      responses:
        "200":
          description: Alive.
          content:
            application/json:
              schema:
                type: object
                properties: { status: { type: string } }
  /api/health/ready:
    get:
      tags: [Health]
      operationId: healthReady
      security: []
      summary: Readiness probe (verifies the database).
      responses:
        "200":
          description: Ready.
          content:
            application/json:
              schema:
                type: object
                properties: { status: { type: string } }
        "503": { $ref: "#/components/responses/Conflict" }
  /api/v1/projects:
    post:
      tags: [Projects]
      operationId: createProject
      summary: Create a project owned by the actor.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateProjectRequest" }
            example: { name: "Signature Dish Reel" }
      responses:
        "201":
          description: Created.
          headers: { ETag: { $ref: "#/components/headers/ETag" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Unprocessable" }
    get:
      tags: [Projects]
      operationId: listProjects
      summary: List the actor's projects.
      responses:
        "200":
          description: Project list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/projects/{projectId}:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Projects]
      operationId: getProject
      responses:
        "200":
          description: Project.
          headers: { ETag: { $ref: "#/components/headers/ETag" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/projects/{projectId}/activate:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string }
      - $ref: "#/components/parameters/IfMatch"
    post:
      tags: [Projects]
      operationId: activateProject
      responses:
        "200":
          description: Updated project.
          headers: { ETag: { $ref: "#/components/headers/ETag" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "428": { $ref: "#/components/responses/PreconditionRequired" }
  /api/v1/projects/{projectId}/complete:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string }
      - $ref: "#/components/parameters/IfMatch"
    post:
      tags: [Projects]
      operationId: completeProject
      responses:
        "200":
          description: Updated project.
          headers: { ETag: { $ref: "#/components/headers/ETag" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "428": { $ref: "#/components/responses/PreconditionRequired" }
  /api/v1/projects/{projectId}/archive:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string }
      - $ref: "#/components/parameters/IfMatch"
    post:
      tags: [Projects]
      operationId: archiveProject
      responses:
        "200":
          description: Updated project.
          headers: { ETag: { $ref: "#/components/headers/ETag" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "428": { $ref: "#/components/responses/PreconditionRequired" }
  /api/v1/projects/{projectId}/evaluations:
    parameters:
      - name: projectId
